<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovação Financeira | AMBIPAR</title>
    <style>
        :root { --green: #009639; --blue: #1a3c5a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; max-width: 800px; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--green); color: white; padding: 40px; text-align: center; }
        .brand { font-size: 2.5rem; font-weight: 900; letter-spacing: 6px; margin: 0; }
        .header-sub { font-size: 0.8rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        .content { padding: 40px; }
        
        h2 { color: var(--blue); margin: 0; }
        #cnpjDados { color: #888; font-size: 0.9rem; margin-top: 5px; margin-bottom: 30px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #666; text-align: left; padding: 15px; border-bottom: 2px solid var(--green); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95rem; color: #333; }
        
        .summary { margin-top: 30px; padding: 25px; background: #f8f9fa; border-radius: 10px; text-align: right; }
        .total-label { font-size: 0.85rem; color: #666; font-weight: bold; }
        .total-val { font-size: 2rem; font-weight: 800; color: var(--green); }

        .help-btn { position: fixed; bottom: 25px; right: 25px; background: var(--blue); color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; font-size: 0.9rem; }
        .help-btn:hover { background: var(--green); transform: translateY(-3px); }

        .approve-btn { background: var(--green); color: white; border: none; width: 100%; padding: 22px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .approve-btn:hover { background: #007a2e; }
        #loader { text-align: center; padding: 50px; color: var(--green); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="brand">AMBIPAR</div>
        <div class="header-sub">Portal de Liberação Financeira - RH</div>
    </div>
    
    <div class="content">
        <div id="loader">A aceder aos dados seguros do lote...</div>
        
        <div id="main" style="display:none;">
            <h2 id="empresaNome"></h2>
            <div id="cnpjDados"></div>
            
            <table>
                <thead>
                    <tr>
                        <th>Tipo de Pagamento</th>
                        <th>Banco / Grupo</th>
                        <th style="text-align:right;">Valor</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>

            <div class="summary">
                <div class="total-label">TOTAL DO LOTE PARA LIBERAÇÃO</div>
                <div class="total-val" id="totalLote">R$ 0,00</div>
            </div>
            
            <button class="approve-btn" onclick="finalizar()">Confirmar Liberação do Lote</button>
        </div>
    </div>
</div>

<a href="mailto:lucas.rcarvalho@ambipar.com?subject=Ajuda com Aprovação Financeira" class="help-btn">Precisa de ajuda?</a>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx9HgssF2pLN5YpzHjKFjkPxikQKUZ3v8r5MLVzW0TAHJODh2BlQuP3u4hXnOWASUA0/exec';
    const token = new URLSearchParams(window.location.search).get('token');

    if(token) {
        fetch(`${scriptURL}?token=${token}`)
        .then(r => r.json())
        .then(d => {
            if(d.error) { document.getElementById('loader').innerText = "Erro: Token não localizado."; return; }
            
            document.getElementById('empresaNome').innerText = d.empresa;
            document.getElementById('cnpjDados').innerText = `CNPJ: ${d.cnpj}`;
            
            let total = 0;
            const tbody = document.getElementById('corpoTabela');
            
            d.tabela.forEach(item => {
                total += item.valor;
                tbody.innerHTML += `<tr>
                    <td>${item.tipo}</td>
                    <td>${item.banco}</td>
                    <td style="text-align:right; font-weight:bold;">R$ ${item.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                </tr>`;
            });
            
            document.getElementById('totalLote').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        });
    }

    function finalizar() {
        alert('Lote aprovado! O registo foi guardado com sucesso.');
    }
</script>
</body>
</html>
