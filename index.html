<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Pagamentos | Ambipar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #009639; padding: 40px 20px; text-align: center; }
        .logo { width: 160px; filter: brightness(0) invert(1); }
        .content { padding: 30px; text-align: center; }
        .valor-total { font-size: 2.5rem; font-weight: bold; color: #1a3c5a; margin: 10px 0; }
        .label { color: #888; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .breakdown { display: flex; justify-content: space-between; margin: 25px 0; gap: 10px; }
        .box { background: #f8f9fa; padding: 15px; border-radius: 10px; flex: 1; border-top: 3px solid #009639; }
        .box-val { font-weight: bold; color: #1a3c5a; font-size: 0.9rem; }
        .details { text-align: left; font-size: 0.85rem; color: #555; border-top: 1px solid #eee; padding-top: 20px; }
        button { background: #009639; color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #007a2e; }
        #loader { padding: 50px; color: #009639; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="loader">Carregando dados seguros...</div>
    
    <div id="main" style="display:none;">
        <div class="header">
            <img src="https://ambipar.com/wp-content/uploads/2022/05/logo-ambipar.png" class="logo">
        </div>
        <div class="content">
            <div class="label">Total para Liberação</div>
            <div class="valor-total" id="valTotal">R$ 0,00</div>

            <div class="breakdown">
                <div class="box">
                    <div class="label">EDI (Bank)</div>
                    <div class="box-val" id="valEDI">R$ 0,00</div>
                </div>
                <div class="box">
                    <div class="label">PIX (Outros)</div>
                    <div class="box-val" id="valPix">R$ 0,00</div>
                </div>
            </div>

            <div class="details">
                <div style="margin-bottom: 5px;">Empresa: <b id="txtEmpresa">-</b></div>
                <div style="margin-bottom: 5px;">CNPJ: <span id="txtCNPJ">-</span></div>
                <div>Banco Destino: <span id="txtBanco">-</span></div>
            </div>

            <button onclick="confirmar()">Botão de confirmação após liberação</button>
        </div>
    </div>

    <div id="success" style="display:none; padding: 60px 30px; text-align:center;">
        <h2 style="color: #009639;">✓ Confirmado!</h2>
        <p>A liberação foi registrada no sistema.</p>
    </div>
</div>

<script>
    const scriptURL = 'SUA_URL_DO_APPS_SCRIPT_AQUI';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if(token) {
        fetch(`${scriptURL}?token=${token}`)
        .then(r => r.json())
        .then(d => {
            if(d.error) { document.getElementById('loader').innerText = "Erro: Token não encontrado."; return; }
            
            document.getElementById('valTotal').innerText = `R$ ${parseFloat(d.valorTotal).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('valEDI').innerText = `R$ ${parseFloat(d.valorEDI).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('valPix').innerText = `R$ ${parseFloat(d.valorPix).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('txtEmpresa').innerText = d.empresa;
            document.getElementById('txtCNPJ').innerText = d.cnpj;
            document.getElementById('txtBanco').innerText = d.banco;

            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        });
    }

    function confirmar() {
        document.getElementById('main').style.display = 'none';
        document.getElementById('success').style.display = 'block';
    }
</script>
</body>
</html>
