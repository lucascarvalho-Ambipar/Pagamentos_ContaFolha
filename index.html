<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovação Financeira | AMBIPAR</title>
    <style>
        :root { --green: #009639; --blue: #1a3c5a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .card { background: white; max-width: 800px; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: var(--green); color: white; padding: 30px; text-align: center; }
        .brand { font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 5px; }
        .header-sub { font-size: 0.8rem; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 30px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background: #f8f9fa; color: #666; text-align: left; padding: 15px; border-bottom: 2px solid var(--green); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        
        .summary { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: right; }
        .total-label { font-size: 0.9rem; color: #666; }
        .total-val { font-size: 1.8rem; font-weight: bold; color: var(--green); }

        .help-btn { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .help-btn:hover { background: var(--green); }

        button.approve { background: var(--green); color: white; border: none; width: 100%; padding: 20px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="brand">AMBIPAR</div>
        <div class="header-sub">Gestão de Pagamentos - RH Financeiro</div>
    </div>
    
    <div class="content">
        <div id="loader">Carregando lote seguro...</div>
        
        <div id="main" style="display:none;">
            <h2 id="empresaNome" style="margin:0; color: var(--blue);"></h2>
            <p id="cnpjDados" style="color: #888; margin: 5px 0 20px 0;"></p>
            
            <table>
                <thead>
                    <tr>
                        <th>Tipo de Pagamento</th>
                        <th>Grupo / Banco</th>
                        <th style="text-align:right;">Valor</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>

            <div class="summary">
                <div class="total-label">VALOR TOTAL DO LOTE</div>
                <div class="total-val" id="totalLote">R$ 0,00</div>
            </div>
            
            <button class="approve" onclick="confirmar()">Confirmar Liberação do Lote</button>
        </div>
    </div>
</div>

<a href="mailto:lucas.rcarvalho@ambipar.com?subject=Dúvida sobre Liberação Financeira" class="help-btn">Precisa de ajuda?</a>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx9HgssF2pLN5YpzHjKFjkPxikQKUZ3v8r5MLVzW0TAHJODh2BlQuP3u4hXnOWASUA0/exec';
    const token = new URLSearchParams(window.location.search).get('token');

    if(token) {
        fetch(`${scriptURL}?token=${token}`)
        .then(r => r.json())
        .then(d => {
            document.getElementById('empresaNome').innerText = d.empresa;
            document.getElementById('cnpjDados').innerText = `CNPJ: ${d.cnpj}`;
            
            let total = 0;
            const tbody = document.getElementById('corpoTabela');
            
            d.tabela.forEach(item => {
                total += item.valor;
                tbody.innerHTML += `<tr>
                    <td>${item.tipo}</td>
                    <td>${item.banco}</td>
                    <td style="text-align:right;">R$ ${item.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                </tr>`;
            });
            
            document.getElementById('totalLote').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        });
    }

    function confirmar() {
        alert('Lote liberado com sucesso!');
    }
</script>
</body>
</html>
