<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Aprovação Financeira | AMBIPAR</title>
    <style>
        :root { --green: #009639; --blue: #1a3c5a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .card { background: white; max-width: 850px; margin: 0 auto; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--green); color: white; padding: 40px; text-align: center; }
        .brand { font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; }
        .content { padding: 40px; }
        
        .grid-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .sum-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--green); }
        .sum-label { font-size: 0.75rem; color: #888; font-weight: bold; text-transform: uppercase; }
        .sum-val { font-size: 1.4rem; font-weight: bold; color: var(--blue); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid var(--green); color: #666; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .total-lote { margin-top: 25px; background: var(--blue); color: white; padding: 20px; border-radius: 8px; text-align: right; }
        .total-lote span { font-size: 1.8rem; font-weight: 800; display: block; color: #4ade80; }

        button { width: 100%; background: var(--green); color: white; border: none; padding: 20px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; margin-top: 30px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #007a2e; }
        #loader { text-align: center; padding: 50px; color: var(--green); font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header"><div class="brand">AMBIPAR</div></div>
        <div class="content">
            <div id="loader">Acessando lote seguro...</div>
            <div id="main" style="display:none;">
                <h2 id="empresa" style="color: var(--blue); margin-bottom: 5px;"></h2>
                <div id="cnpj" style="color: #888; margin-bottom: 30px; font-size: 0.85rem;"></div>

                <div class="grid-summary">
                    <div class="sum-box">
                        <div class="sum-label">Total EDI</div>
                        <div id="valEDI" class="sum-val">R$ 0,00</div>
                    </div>
                    <div class="sum-box">
                        <div class="sum-label">Total PIX</div>
                        <div id="valPix" class="sum-val">R$ 0,00</div>
                    </div>
                </div>

                <table>
                    <thead><tr><th>Pagamento</th><th>Banco / Grupo</th><th style="text-align:right;">Valor</th></tr></thead>
                    <tbody id="tabela"></tbody>
                </table>

                <div class="total-lote">
                    TOTAL GERAL DO LOTE PARA LIBERAÇÃO
                    <span id="total">R$ 0,00</span>
                </div>
                
                <button onclick="alert('Lote aprovado!')">Confirmar Liberação</button>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzAK6ehdVBM0xjW27sKLlFmMNn86235naHYczHj_t4hu0fRJCn0cyQTEqiCy8Mv6sGy/exec';
        const token = new URLSearchParams(window.location.search).get('token');

        if(token) {
            fetch(`${scriptURL}?token=${token}`)
            .then(r => r.json()).then(d => {
                document.getElementById('empresa').innerText = d.empresa;
                document.getElementById('cnpj').innerText = `CNPJ: ${d.cnpj}`;
                document.getElementById('valEDI').innerText = `R$ ${d.edi.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
                document.getElementById('valPix').innerText = `R$ ${d.pix.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
                
                let t = 0;
                d.tabela.forEach(i => {
                    t += i.valor;
                    document.getElementById('tabela').innerHTML += `<tr><td>${i.tipo}</td><td>${i.banco}</td><td style="text-align:right; font-weight:bold;">R$ ${i.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td></tr>`;
                });
                
                document.getElementById('total').innerText = `R$ ${t.toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            });
        }
    </script>
</body>
</html>
