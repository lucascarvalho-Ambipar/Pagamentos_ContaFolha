<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portal de Liberação - Ambipar</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 20px; display: flex; justify-content: center; }
        .card-aprovacao { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .header { border-bottom: 2px solid #27ae60; margin-bottom: 20px; padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        .label { color: #7f8c8d; font-size: 0.9rem; }
        .value { font-weight: bold; color: #2c3e50; }
        .btn-confirmar { background: #27ae60; color: white; width: 100%; border: none; padding: 20px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-confirmar:active { transform: scale(0.98); }
        .success-msg { color: #27ae60; text-align: center; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card-aprovacao">
    <div class="header">
        <h2>Liberação de Pagamento</h2>
        <p id="nomeEmpresa">Carregando dados...</p>
    </div>

    <div id="dadosPagamento">
        <div class="info-row"><span class="label">Banco:</span> <span class="value" id="banco">-</span></div>
        <div class="info-row"><span class="label">CNPJ:</span> <span class="value" id="cnpj">-</span></div>
        <div class="info-row"><span class="label">Valor Total:</span> <span class="value" id="valor" style="font-size: 1.4rem; color: #e67e22;">-</span></div>
        
        <button class="btn-confirmar" onclick="confirmar()">Botão de confirmação após liberação</button>
    </div>
    
    <div id="msgSucesso" class="success-msg">
        <h3>✓ Liberação Confirmada com Sucesso!</h3>
        <p>Obrigado, o financeiro já foi notificado.</p>
    </div>
</div>

<script>
    // Lógica para pegar o Token na URL e buscar os dados
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    // Aqui você faria um fetch para buscar os dados do token no Google Sheets
    // Por enquanto, simulamos o preenchimento para você ver o visual.
    
    function confirmar() {
        document.getElementById('dadosPagamento').style.display = 'none';
        document.getElementById('msgSucesso').style.display = 'block';
        // Aqui enviaria a confirmação de volta para a planilha
    }
</script>
</body>
</html>
